name: CI (PR)

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAXSIZE: 500M

jobs:
  # ── Security check: prevent code execution from forks ────────────────
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for dangerous patterns
        run: |
          echo "⚠️  PR from: ${{ github.head_ref }}"
          echo "⚠️  Author: ${{ github.event.pull_request.user.login }}"
          echo "⚠️  This PR requires approval before running on self-hosted runners."
          echo ""
          echo "Security checks:"
          echo "✓ PR is from a branch (not direct push)"
          echo "✓ Will run in context of ${{ github.base_ref }} branch"

  # ── Build with -Wall -Wextra (requires approval) ─────────────────────
  build:
    runs-on: [self-hosted, linux, x64]
    container: ghcr.io/rusik69/os-ci:latest
    timeout-minutes: 10
    needs: [security-check]
    environment: ci-approval
    steps:
      - uses: actions/checkout@v4
      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-
      - name: Build kernel
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)
      - name: Check binary
        run: ls -lh build/kernel.bin

  # ── Build with -Werror (requires approval) ───────────────────────────
  build-strict:
    runs-on: [self-hosted, linux, x64]
    container: ghcr.io/rusik69/os-ci:latest
    timeout-minutes: 10
    needs: [security-check]
    environment: ci-approval
    steps:
      - uses: actions/checkout@v4
      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-strict-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-strict-
      - name: Build kernel with -Werror
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            CFLAGS="-std=c17 -ffreestanding -mno-red-zone -mno-mmx -mno-sse -mno-sse2 \
                    -fno-stack-protector -nostdlib -nostdinc -fno-builtin \
                    -Wall -Wextra -Werror \
                    -Isrc/include -Isrc/gui -Isrc/doom -mcmodel=large -g \
                    -Wa,--noexecstack -O2 -MMD -MP" \
            -j$(nproc)

  # ── Static analysis (requires approval) ─────────────────────────────
  static-analysis:
    runs-on: [self-hosted, linux, x64]
    container: ghcr.io/rusik69/os-ci:latest
    timeout-minutes: 10
    needs: [security-check]
    environment: ci-approval
    steps:
      - uses: actions/checkout@v4
      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
            --suppress=unusedFunction \
            --suppress=constVariablePointer \
            --suppress=constParameterPointer \
            --suppress=variableScope \
            --suppress=unreadVariable \
            --suppress=arrayIndexThenCheck \
            --suppress=redundantInitialization \
            --suppress=knownConditionTrueFalse \
            --suppress=badBitmaskCheck \
            --suppress=unusedStructMember \
            --suppress=constVariable \
            --suppress=shadowVariable \
            --suppress=redundantAssignment \
            --suppress=oppositeInnerCondition \
            --suppress=zerodivcond \
            --suppress=staticStringCompare \
            --suppress=unsignedLessThanZero \
            --suppress=arrayIndexOutOfBoundsCond \
            --suppress=constParameterCallback \
            --suppress=clarifyCondition \
            --suppress=redundantCondition \
            --suppress=duplicateValueTernary \
            --suppress=useStandardLibrary \
            --suppress=checkersReport \
            --suppress=checkLevelNormal \
            --std=c17 \
            -Isrc/include -Isrc/gui -Isrc/doom \
            --inline-suppr \
            --error-exitcode=1 \
            src/ 2>&1

  # ── Code formatting check (no approval needed) ───────────────────────
  format-check:
    runs-on: [self-hosted, linux, x64]
    container: ghcr.io/rusik69/os-ci:latest
    timeout-minutes: 5
    needs: [security-check]
    steps:
      - uses: actions/checkout@v4
      - name: Check code formatting
        run: |
          if ! command -v git-clang-format >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq clang-format-18
            ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
            ln -sf /usr/bin/clang-format-18 /usr/local/bin/git-clang-format
          fi
          BASE_REF="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          make format-check FORMAT_BASE_REF="$BASE_REF"

  # ── In-kernel unit tests (requires approval) ─────────────────────────
  test:
    runs-on: [self-hosted, linux, x64]
    container: ghcr.io/rusik69/os-ci:latest
    timeout-minutes: 15
    needs: [security-check]
    environment: ci-approval
    steps:
      - uses: actions/checkout@v4
      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-test-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-test-
      - name: Build kernel + disk image
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)
      - name: Build test kernel
        run: |
          make test-kernel \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)
      - name: Run QEMU boot test
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh build_test/kernel.bin build/disk.img
        env:
          TIMEOUT: "300"

  # ── E2E tests (requires approval) ───────────────────────────────────
  e2e:
    runs-on: [self-hosted, linux, x64]
    container: ghcr.io/rusik69/os-ci:latest
    timeout-minutes: 15
    needs: [security-check]
    environment: ci-approval
    steps:
      - uses: actions/checkout@v4
      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-
      - name: Build kernel + disk image
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)
      - name: Run E2E tests
        run: |
          chmod +x tests/e2e.sh tests/e2e.py
          ./tests/e2e.sh build/kernel.bin build/disk.img
        env:
          E2E_BOOT_TIMEOUT: "180"
          E2E_TIMEOUT: "45"
          E2E_EXTERNAL_DNS: "0"

  # ── Host-side libc unit tests (no approval needed) ───────────────────
  libc-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libc6-dev make binutils
      - name: Build and run host-side libc tests
        run: |
          cd tests/host_libc
          make 2>&1
