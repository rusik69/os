name: CI (PR)

# Security: This workflow uses pull_request_target to run in the context of
# the BASE branch (main), not the fork. This prevents forked PRs from
# accessing secrets or running arbitrary code on the self-hosted runner.
#
# All jobs require approval via the "ci-approval" environment before they
# can run on the self-hosted runner.

on:
  pull_request:
    branches: [main, master]

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAXSIZE: 500M

jobs:
  # ── Security check: prevent code execution from forks ────────────────
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for dangerous patterns
        run: |
          echo "⚠️  PR from: ${{ github.head_ref }}"
          echo "⚠️  Author: ${{ github.event.pull_request.user.login }}"
          echo "⚠️  This PR requires approval before running on self-hosted runners."
          echo ""
          echo "Security checks:"
          echo "✓ PR is from a branch (not direct push)"
          echo "✓ Will run in context of ${{ github.base_ref }} branch"

  # ── Build with -Wall -Wextra (requires approval) ─────────────────────
  build:
    runs-on: [self-hosted, linux, x64]
    container: ubuntu:24.04
    timeout-minutes: 10
    needs: [security-check]
    environment:
      name: ci-approval
      url: ${{ github.event.pull_request.html_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            nasm ccache make binutils

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-build-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-build-

      - name: Build kernel
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)

      - name: Check binary
        run: ls -lh build/kernel.bin && file build/kernel.bin

  # ── Build with -Werror (requires approval) ───────────────────────────
  build-strict:
    runs-on: [self-hosted, linux, x64]
    container: ubuntu:24.04
    timeout-minutes: 10
    needs: [security-check]
    environment:
      name: ci-approval
      url: ${{ github.event.pull_request.html_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            nasm ccache make binutils

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-strict-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-build-

      - name: Build kernel with -Werror
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            CFLAGS="-std=c17 -ffreestanding -mno-red-zone -mno-mmx -mno-sse -mno-sse2 \
                    -fno-stack-protector -nostdlib -nostdinc -fno-builtin \
                    -Wall -Wextra -Werror \
                    -Isrc/include -Isrc/gui -Isrc/doom -mcmodel=large -g \
                    -Wa,--noexecstack -O2 -MMD -MP" \
            -j$(nproc)

  # ── Static analysis (requires approval) ─────────────────────────────
  static-analysis:
    runs-on: [self-hosted, linux, x64]
    container: ubuntu:24.04
    timeout-minutes: 10
    needs: [security-check]
    environment:
      name: ci-approval
      url: ${{ github.event.pull_request.html_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            --std=c17 \
            -Isrc/include -Isrc/gui -Isrc/doom \
            --inline-suppr \
            --error-exitcode=1 \
            src/ 2>&1 || true

  # ── In-kernel unit tests (requires approval) ─────────────────────────
  test:
    runs-on: [self-hosted, linux, x64]
    container: ubuntu:24.04
    timeout-minutes: 15
    needs: [build, security-check]
    environment:
      name: ci-approval
      url: ${{ github.event.pull_request.html_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            nasm ccache make binutils qemu-system-x86

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-test-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-test-

      - name: Build test kernel
        run: |
          make test-kernel \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)

      - name: Create disk image
        run: |
          mkdir -p build
          dd if=/dev/zero of=build/disk.img bs=1M count=16 2>/dev/null

      - name: Run unit tests
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh build_test/kernel.bin build/disk.img
        env:
          TIMEOUT: "300"

  # ── E2E tests (requires approval) ───────────────────────────────────
  e2e:
    runs-on: [self-hosted, linux, x64]
    container: ubuntu:24.04
    timeout-minutes: 15
    needs: [build, security-check]
    environment:
      name: ci-approval
      url: ${{ github.event.pull_request.html_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            nasm ccache make binutils qemu-system-x86 python3

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-pr-e2e-${{ github.event.pull_request.head.sha }}
          restore-keys: ccache-e2e-

      - name: Build kernel
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)

      - name: Create disk image
        run: |
          mkdir -p build
          dd if=/dev/zero of=build/disk.img bs=1M count=16 2>/dev/null

      - name: Run E2E tests
        run: |
          chmod +x tests/e2e.sh tests/e2e.py
          ./tests/e2e.sh build/kernel.bin build/disk.img
        env:
          E2E_BOOT_TIMEOUT: "180"
          E2E_TIMEOUT: "45"
          E2E_EXTERNAL_DNS: "0"

  # ── Host-side libc unit tests (no approval needed) ───────────────────
  libc-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security-check]
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-x86-64-linux-gnu

      - name: Build and run host-side libc tests
        run: |
          cd tests/host_libc
          make 2>&1
