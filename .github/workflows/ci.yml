name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAXSIZE: 500M

jobs:
  # ── Build: GCC release ──────────────────────────────────────────────
  build-gcc-release:
    name: Build (GCC release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            ccache \
            make 2>&1 | tail -5

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-gcc-release-${{ github.sha }}
          restore-keys: ccache-gcc-release-

      - name: Build kernel (release)
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)

      - name: Check binary
        run: ls -lh build/kernel.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-gcc-release
          path: |
            build/kernel.bin
            build/kernel.elf
          if-no-files-found: warn

  # ── Build: GCC debug (no optimization, full asserts) ───────────────
  build-gcc-debug:
    name: Build (GCC debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            build-essential \
            gcc \
            nasm \
            ccache \
            make 2>&1 | tail -5

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-gcc-debug-${{ github.sha }}
          restore-keys: ccache-gcc-debug-

      - name: Build kernel (debug)
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            CFLAGS="-std=c17 -ffreestanding -mno-red-zone -mno-mmx -mno-sse -mno-sse2 \
                    -fno-stack-protector -nostdlib -nostdinc -fno-builtin \
                    -Wall -Wextra \
                    -Isrc/include -Isrc/gui -Isrc/doom -mcmodel=large -g -O0 \
                    -Wa,--noexecstack -MMD -MP" \
            -j$(nproc)

      - name: Check binary
        run: ls -lh build/kernel.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-gcc-debug
          path: |
            build/kernel.bin
            build/kernel.elf
          if-no-files-found: warn

  # ── Build: Clang release ────────────────────────────────────────────
  build-clang-release:
    name: Build (Clang release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            binutils-x86-64-linux-gnu \
            build-essential \
            clang \
            lld \
            nasm \
            ccache \
            make 2>&1 | tail -5

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-clang-release-${{ github.sha }}
          restore-keys: ccache-clang-release-

      - name: Build kernel with Clang (release)
        run: |
          make all \
            CC="ccache clang" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            -j$(nproc)

      - name: Check binary
        run: ls -lh build/kernel.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-clang-release
          path: |
            build/kernel.bin
            build/kernel.elf
          if-no-files-found: warn

  # ── Build: Clang debug (no optimization, full asserts) ─────────────
  build-clang-debug:
    name: Build (Clang debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            binutils-x86-64-linux-gnu \
            build-essential \
            clang \
            lld \
            nasm \
            ccache \
            make 2>&1 | tail -5

      - name: ccache cache
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-clang-debug-${{ github.sha }}
          restore-keys: ccache-clang-debug-

      - name: Build kernel with Clang (debug)
        run: |
          make all \
            CC="ccache clang" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            CFLAGS="-std=c17 -ffreestanding -mno-red-zone -mno-mmx -mno-sse -mno-sse2 \
                    -fno-stack-protector -nostdlib -nostdinc -fno-builtin \
                    -Wall -Wextra \
                    -Isrc/include -Isrc/gui -Isrc/doom -mcmodel=large -g -O0 \
                    -Wa,--noexecstack -MMD -MP" \
            -j$(nproc)

      - name: Check binary
        run: ls -lh build/kernel.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-clang-debug
          path: |
            build/kernel.bin
            build/kernel.elf
          if-no-files-found: warn

  # ── Host-side libc unit tests ───────────────────────────────────────
  libc-test:
    name: libc unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libc6-dev make binutils 2>&1 | tail -5

      - name: Build and run host-side libc tests
        run: |
          cd tests/host_libc
          make 2>&1
