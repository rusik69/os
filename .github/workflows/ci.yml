# .github/workflows/ci.yml — CI workflow for Hermes OS
#
# Builds the kernel, userspace, runs unit tests, and QEMU boot test.

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Kernel build ─────────────────────────────────────────────────────
  kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            x86_64-elf-gcc x86_64-linux-gnu-gcc \
            xorriso grub-pc-bin

      - name: Build kernel
        run: |
          make -j$(nproc)

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: |
            build/kernel.bin
            build/disk.img

  # ── Userspace build ──────────────────────────────────────────────────
  userspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            x86_64-linux-gnu-gcc

      - name: Build userspace
        run: |
          cd userspace && make -j$(nproc)

      - name: Verify initramfs.cpio
        run: |
          if [ -f userspace/initramfs.cpio ]; then
            echo "✅ initramfs.cpio created"
            ls -lh userspace/initramfs.cpio
            file userspace/initramfs.cpio
          else
            echo "❌ initramfs.cpio not found!"
            exit 1
          fi

      - name: Upload initramfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: initramfs
          path: userspace/initramfs.cpio

  # ── Host-side unit tests ────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential

      - name: Run host-side unit tests
        run: |
          make unit-test

  # ── QEMU boot test ──────────────────────────────────────────────────
  boot-test:
    runs-on: ubuntu-latest
    needs: [kernel]
    steps:
      - uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v8
        with:
          name: kernel
          path: build/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86 python3

      - name: Run QEMU boot test
        run: |
          python3 src/test/boot_test.py \
            --kernel build/kernel.bin \
            --disk build/disk.img \
            --timeout 30

  # ── Full build check (kernel + userspace) ──────────────────────────
  full-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            x86_64-elf-gcc x86_64-linux-gnu-gcc

      - name: Build kernel
        run: |
          make -j$(nproc)

      - name: Build userspace
        run: |
          cd userspace && make -j$(nproc)

      - name: Verify both artifacts
        run: |
          ls -lh build/kernel.bin
          ls -lh userspace/initramfs.cpio
