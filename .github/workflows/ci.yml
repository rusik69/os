name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-gcc:
    name: Build (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            python3 \
            cppcheck \
            clang-format

      - name: Build kernel (release)
        run: make -j$(nproc)

      - name: Unit tests
        run: make unit-test

      - name: Build check kernel (-Werror + extra warnings)
        run: make -j$(nproc) build_check/kernel.bin

      - name: Run build-time tests in QEMU
        timeout-minutes: 5
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh build_check/kernel.bin build/disk.img

      - name: E2E smoke test
        timeout-minutes: 10
        run: |
          make e2e-smoke

      - name: Format check
        run: make format-check || echo "clang-format issues found (non-fatal)"

      - name: Lint
        run: make lint || echo "cppcheck warnings found (non-fatal)"

  build-clang:
    name: Build (Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            lld \
            nasm \
            qemu-system-x86 \
            python3

      - name: Build with Clang
        run: make CC=clang LD=lld -j$(nproc)

      - name: E2E smoke test (Clang build)
        timeout-minutes: 10
        run: |
          make CC=clang LD=lld e2e-smoke

  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            python3

      - name: Debug build
        run: make DEBUG=1 -j$(nproc)

      - name: E2E smoke test (debug build)
        timeout-minutes: 10
        run: |
          make DEBUG=1 e2e-smoke
