name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  CC: x86_64-linux-gnu-gcc
  LD: x86_64-linux-gnu-ld
  OBJCOPY: x86_64-linux-gnu-objcopy

jobs:
  build-gcc:
    name: Build (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            python3 \
            cppcheck \
            clang-format-18 \
            ccache \
            dosfstools \
            mtools

      - name: Build kernel (release)
        run: make -j$(nproc)

      - name: Unit tests
        run: make unit-test

      - name: Build check kernel (-Werror + extra warnings)
        run: make -j$(nproc) build_check/kernel.bin

      - name: Run build-time tests in QEMU
        timeout-minutes: 5
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh build_check/kernel.bin build/disk.img

      - name: E2E smoke test
        timeout-minutes: 10
        run: |
          make e2e-smoke

      - name: Format check
        run: make format-check || echo "clang-format issues found (non-fatal)"

      - name: Lint
        run: make lint || echo "cppcheck warnings found (non-fatal)"

  build-clang:
    name: Build (Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang-18 \
            lld-18 \
            nasm \
            qemu-system-x86 \
            python3 \
            ccache

      - name: Build with Clang
        run: |
          make CC="ccache clang-18" LD=ld.lld-18 OBJCOPY=llvm-objcopy-18 \
            CFLAGS_EXTRA="-Wno-error=implicit-function-declaration -Wno-error=incompatible-function-pointer-types -Wno-error=unused-function" \
            -j$(nproc)

      - name: E2E smoke test (Clang build)
        timeout-minutes: 10
        run: |
          make CC="ccache clang-18" LD=ld.lld-18 OBJCOPY=llvm-objcopy-18 \
            CFLAGS_EXTRA="-Wno-error=implicit-function-declaration -Wno-error=incompatible-function-pointer-types -Wno-error=unused-function" \
            e2e-smoke

  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            python3 \
            ccache

      - name: Debug build
        run: make CFLAGS_EXTRA="-O0 -g3 -DASSERT_ENABLED=1" -j$(nproc)

      - name: E2E smoke test (debug build)
        continue-on-error: true
        timeout-minutes: 10
        run: |
          make CFLAGS_EXTRA="-O0 -g3 -DASSERT_ENABLED=1" e2e-smoke || \
            echo "⚠️ E2E test skipped for debug build (kernel may not boot with -O0)"
