# .github/workflows/ci.yml — CI workflow for Hermes OS
#
# Builds the kernel, userspace, runs unit tests, boot test, and quality checks.
# Uses ccache for 10-20x faster rebuilds on repeated commits.

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAXSIZE: 500M

jobs:
  # ── Build kernel ────────────────────────────────────────────────────
  kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            gcc-x86-64-linux-gnu xorriso grub-pc-bin mtools \
            ccache

      - name: ccache cache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-kernel-${{ github.sha }}
          restore-keys: |
            ccache-kernel-
            ccache-

      - name: Build kernel + disk image
        run: |
          make -j$(nproc) \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy
          echo "ccache stats:" && ccache -s

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: |
            build/kernel.bin
            build/disk.img
          retention-days: 7

      - name: Summary
        run: |
          echo "## Kernel Build" >> $GITHUB_STEP_SUMMARY
          echo "- kernel.bin: $(ls -lh build/kernel.bin | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- disk.img: $(ls -lh build/disk.img | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- ccache hit rate: $(ccache -s | grep 'cache hit rate' | awk '{print $4}')" >> $GITHUB_STEP_SUMMARY

  # ── Build userspace ─────────────────────────────────────────────────
  userspace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            gcc-x86-64-linux-gnu

      - name: Build userspace
        run: |
          cd userspace && make -j$(nproc) \
            CC=x86_64-linux-gnu-gcc \
            LD=x86_64-linux-gnu-ld

      - name: Verify initramfs.cpio
        run: |
          if [ -f userspace/initramfs.cpio ]; then
            echo "✅ initramfs.cpio created"
            ls -lh userspace/initramfs.cpio
            file userspace/initramfs.cpio
          else
            echo "❌ initramfs.cpio not found!"
            exit 1
          fi

      - name: Upload initramfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: initramfs
          path: userspace/initramfs.cpio
          retention-days: 7

      - name: Summary
        run: |
          echo "## Userspace Build" >> $GITHUB_STEP_SUMMARY
          echo "- initramfs.cpio: $(ls -lh userspace/initramfs.cpio | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY

  # ── Host-side unit tests ───────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential

      - name: Build unit test binaries
        run: |
          make -C tests/host_libc all -j$(nproc)
          make -C tests/unit all -j$(nproc)

      - name: Run unit tests (JUnit XML)
        run: |
          make junit-test JUNIT_DIR=${{ runner.temp }}/test-reports

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: ${{ runner.temp }}/test-reports/
          retention-days: 7

      - name: Summary
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          for f in ${{ runner.temp }}/test-reports/*-results.xml; do
            name="$$(basename "$$f" -results.xml)"
            tests="$$(grep -o 'tests="[0-9]*"' "$$f" | head -1 | grep -o '[0-9]*')"
            fails="$$(grep -o 'failures="[0-9]*"' "$$f" | head -1 | grep -o '[0-9]*')"
            echo "- $$name: $$tests tests, $$fails failures" >> $GITHUB_STEP_SUMMARY
          done

  # ── QEMU boot test ─────────────────────────────────────────────────
  boot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [kernel]
    steps:
      - uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel
          path: build/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86 python3

      - name: Run QEMU boot test
        run: |
          python3 src/test/boot_test.py \
            --kernel build/kernel.bin \
            --disk build/disk.img \
            --timeout 30

      - name: Summary
        run: |
          echo "## Boot Test" >> $GITHUB_STEP_SUMMARY
          echo "- Kernel boots successfully in QEMU" >> $GITHUB_STEP_SUMMARY

  # ── Full build check (kernel + userspace) ──────────────────────────
  full-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            gcc-x86-64-linux-gnu xorriso grub-pc-bin mtools \
            ccache

      - name: ccache cache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-full-${{ github.sha }}
          restore-keys: |
            ccache-full-
            ccache-

      - name: Build kernel
        run: |
          make -j$(nproc) \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy

      - name: Build userspace
        run: |
          cd userspace && make -j$(nproc) \
            CC=x86_64-linux-gnu-gcc \
            LD=x86_64-linux-gnu-ld

      - name: Verify both artifacts
        run: |
          ls -lh build/kernel.bin
          ls -lh userspace/initramfs.cpio

      - name: ccache stats
        run: ccache -s

      - name: Summary
        run: |
          echo "## Full Build" >> $GITHUB_STEP_SUMMARY
          echo "- kernel.bin: $(ls -lh build/kernel.bin | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- disk.img: $(ls -lh build/disk.img | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- initramfs.cpio: $(ls -lh userspace/initramfs.cpio | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY

  # ── Code formatting check ──────────────────────────────────────────
  format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/git-clang-format

      - name: Check formatting
        run: |
          BASE_REF="origin/${{ github.base_ref || 'main' }}"
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1 2>/dev/null || true
          make format-check FORMAT_BASE_REF="$BASE_REF"

      - name: Summary
        run: echo "## Format Check" >> $GITHUB_STEP_SUMMARY

  # ── Static analysis (cppcheck) ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cppcheck

      - name: Run cppcheck
        run: |
          make cppcheck-check

      - name: Summary
        run: |
          echo "## Lint (cppcheck)" >> $GITHUB_STEP_SUMMARY
          echo "- No cppcheck warnings found" >> $GITHUB_STEP_SUMMARY

  # ── E2E smoke test ─────────────────────────────────────────────────
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [kernel]
    steps:
      - uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel
          path: build/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            gcc-x86-64-linux-gnu xorriso grub-pc-bin mtools \
            python3 telnet

      - name: Build/repair disk image
        run: |
          # Quick rebuild to ensure initramfs references are satisfied
          make -j$(nproc) \
            CC="x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            build/disk.img

      - name: Run e2e smoke test
        run: |
          E2E_SMOKE=1 ./tests/e2e.sh build/kernel.bin build/disk.img
        env:
          E2E_BOOT_TIMEOUT: "60"
          E2E_TIMEOUT: "15"
          E2E_EXTERNAL_DNS: "0"

      - name: Summary
        run: |
          echo "## E2E Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "- E2E tests passed" >> $GITHUB_STEP_SUMMARY
