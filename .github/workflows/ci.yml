name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAXSIZE: 500M

# YAML anchors for common step patterns
x-ccache: &ccache
  name: ccache cache
  continue-on-error: true
  uses: actions/cache@v5

x-checkout: &checkout
  uses: actions/checkout@v6

x-build-kernel: &build-kernel
  name: Build kernel
  run: |
    make all \
      CC="ccache x86_64-linux-gnu-gcc" \
      LD=x86_64-linux-gnu-ld \
      OBJCOPY=x86_64-linux-gnu-objcopy \
      -j$(nproc)

x-build-test-kernel: &build-test-kernel
  name: Build test kernel
  run: |
    make test-kernel \
      CC="ccache x86_64-linux-gnu-gcc" \
      LD=x86_64-linux-gnu-ld \
      OBJCOPY=x86_64-linux-gnu-objcopy \
      -j$(nproc)

x-disk-image: &disk-image
  name: Create disk image
  run: |
    mkdir -p build
    dd if=/dev/zero of=build/disk.img bs=1M count=16 2>/dev/null

# Base CI image with all tools pre-installed
x-ci-container: &ci-container
  container: ghcr.io/rusik69/os-ci:latest

jobs:
  # ── Build with -Wall -Wextra (baseline) ──────────────────────────────
  build:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 10
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-build-${{ github.sha }}
          restore-keys: ccache-build-
      - *build-kernel
      - name: Check binary
        run: ls -lh build/kernel.bin

  # ── Build with -Werror (strict mode) ─────────────────────────────────
  build-strict:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 10
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-strict-${{ github.sha }}
          restore-keys: ccache-strict-
      - name: Build kernel with -Werror
        run: |
          make all \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            CFLAGS="-std=c17 -ffreestanding -mno-red-zone -mno-mmx -mno-sse -mno-sse2 \
                    -fno-stack-protector -nostdlib -nostdinc -fno-builtin \
                    -Wall -Wextra -Werror \
                    -Isrc/include -Isrc/gui -Isrc/doom -mcmodel=large -g \
                    -Wa,--noexecstack -O2 -MMD -MP" \
            -j$(nproc)

  # ── Static analysis (cppcheck) ───────────────────────────────────────
  static-analysis:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 10
    steps:
      - *checkout
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            --std=c17 \
            -Isrc/include -Isrc/gui -Isrc/doom \
            --inline-suppr \
            --error-exitcode=1 \
            src/ 2>&1 || true

  # ── In-kernel unit tests (QEMU) ──────────────────────────────────────
  test:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 15
    needs: [build]
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-test-${{ github.sha }}
          restore-keys: ccache-test-
      - *build-test-kernel
      - *disk-image
      - name: Run unit tests
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh build_test/kernel.bin build/disk.img
        env:
          TIMEOUT: "300"

  # ── E2E tests (telnet-driven shell commands) ─────────────────────────
  e2e:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 15
    needs: [build]
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-e2e-${{ github.sha }}
          restore-keys: ccache-e2e-
      - *build-kernel
      - *disk-image
      - name: Run E2E tests
        run: |
          chmod +x tests/e2e.sh tests/e2e.py
          ./tests/e2e.sh build/kernel.bin build/disk.img
        env:
          E2E_BOOT_TIMEOUT: "180"
          E2E_TIMEOUT: "45"
          E2E_EXTERNAL_DNS: "0"

  # ── virtio-net smoke test ────────────────────────────────────────────
  virtio-net-smoke:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 10
    needs: [build]
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-virtio-${{ github.sha }}
          restore-keys: ccache-virtio-
      - *build-kernel
      - name: Create disk image
        run: dd if=/dev/zero of=build/disk.img bs=1M count=16 2>/dev/null
      - name: Boot with virtio-net and check serial markers
        run: |
          SERIAL=$(mktemp)
          timeout 60 qemu-system-x86_64 \
            -kernel build/kernel.bin -m 256M \
            -serial file:$SERIAL -display none -vga none \
            -drive file=build/disk.img,format=raw,if=ide \
            -netdev user,id=net0,hostfwd=tcp::2324-:23 \
            -device virtio-net-pci,netdev=net0 \
            -no-reboot || true
          grep -E "virtio-net: initialized|DHCP:" "$SERIAL" || \
            (echo "virtio-net smoke markers not found"; cat "$SERIAL"; exit 1)

  # ── USB + FAT32 smoke test ───────────────────────────────────────────
  usb-fat-smoke:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-usbfat-${{ github.sha }}
          restore-keys: ccache-usbfat-
      - *build-kernel
      - name: Create disk images
        run: |
          mkdir -p build
          dd if=/dev/zero of=build/disk.img bs=1M count=16 2>/dev/null
          dd if=/dev/zero of=build/fat32_usb.img bs=4M count=1 2>/dev/null
          mkfs.vfat -F 32 build/fat32_usb.img
          echo smoke > /tmp/mnt_smoke.txt
          mcopy -i build/fat32_usb.img /tmp/mnt_smoke.txt ::smoke.txt
      - name: QEMU USB FAT smoke
        run: |
          SERIAL=$(mktemp)
          timeout 45 qemu-system-x86_64 \
            -kernel build/kernel.bin -m 256M \
            -serial file:$SERIAL -display none -vga none \
            -drive file=build/disk.img,format=raw,if=ide \
            -drive file=build/fat32_usb.img,format=raw,if=none,id=usb0 \
            -device usb-ehci -device usb-storage,drive=usb0 \
            -netdev user,id=net0 -device virtio-net-pci,netdev=net0 \
            -no-reboot || true
          grep -E "USB MSC|FAT32 mounted" "$SERIAL" || \
            (echo "USB/FAT smoke markers not found"; cat "$SERIAL"; exit 1)

  # ── Host-side libc unit tests ────────────────────────────────────────
  libc-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - *checkout
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libc6-dev make binutils
      - name: Build and run host-side libc tests
        run: |
          cd tests/host_libc
          make 2>&1

  # ── Release (tag pushes only) ────────────────────────────────────────
  release:
    runs-on: [self-hosted, linux, x64]
    <<: *ci-container
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - *checkout
      - <<: *ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-release-${{ github.sha }}
          restore-keys: ccache-release-
      - *build-kernel
      - *disk-image
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/kernel.bin
            build/disk.img
          generate_release_notes: true
