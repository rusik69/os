name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  CC: x86_64-linux-gnu-gcc
  LD: x86_64-linux-gnu-ld
  OBJCOPY: x86_64-linux-gnu-objcopy

jobs:
  build-gcc:
    name: Build (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            python3 \
            cppcheck \
            clang-format-18 \
            ccache \
            dosfstools \
            mtools

      - name: Build kernel (release)
        run: make -j$(nproc)

      - name: Host-side unit tests
        run: make unit-test

      - name: Build check kernel (-Werror + extra warnings)
        run: make -j$(nproc) build_check/kernel.bin

      - name: Host-side tests with address sanitizer
        run: |
          echo "=== Memory allocator tests (ASan) ==="
          gcc -Wall -Werror -g -O0 -fsanitize=address -o /tmp/test_memory_asan tests/unit/test_memory.c
          /tmp/test_memory_asan
          echo ""
          echo "=== Filesystem tests (ASan) ==="
          gcc -Wall -Werror -g -O0 -fsanitize=address -o /tmp/test_fs_asan tests/unit/test_fs.c
          /tmp/test_fs_asan
          echo ""
          echo "=== Socket tests (ASan) ==="
          gcc -Wall -Werror -g -O0 -fsanitize=address -o /tmp/test_socket_asan tests/unit/test_socket.c
          /tmp/test_socket_asan

      - name: Format check
        run: make format-check || echo "clang-format issues found (non-fatal)"

      - name: Lint
        run: make lint || echo "cppcheck warnings found (non-fatal)"

  build-clang:
    name: Build (Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang-18 \
            lld-18 \
            nasm \
            qemu-system-x86 \
            python3 \
            ccache

      - name: Build with Clang
        run: |
          make CC="ccache clang-18" LD=ld.lld-18 OBJCOPY=llvm-objcopy-18 \
            CFLAGS_EXTRA="-Wno-error=implicit-function-declaration -Wno-error=incompatible-function-pointer-types -Wno-error=unused-function" \
            -j$(nproc)

  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            build-essential \
            gcc \
            nasm \
            qemu-system-x86 \
            python3 \
            ccache

      - name: Debug build
        run: make CFLAGS_EXTRA="-O0 -g3 -DASSERT_ENABLED=1" -j$(nproc)
