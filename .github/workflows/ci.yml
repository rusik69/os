# .github/workflows/ci.yml — CI workflow for Hermes OS
#
# Builds the kernel, userspace, runs unit tests, boot test, and quality checks.
# Uses ccache for 10-20x faster rebuilds on repeated commits.

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: /tmp/ccache
  CCACHE_MAXSIZE: 500M

jobs:
  # ── Build kernel ────────────────────────────────────────────────────
  kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Make version
        run: make --version

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            gcc-x86-64-linux-gnu xorriso grub-pc-bin mtools \
            ccache

      - name: ccache cache
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-kernel-${{ github.sha }}
          restore-keys: |
            ccache-kernel-
            ccache-

      - name: Build kernel + disk image
        run: |
          make -j$(nproc) \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy
          echo "ccache stats:" && ccache -s

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: |
            build/kernel.bin
            build/disk.img
          retention-days: 7

      - name: Summary
        run: |
          echo "## Kernel Build" >> $GITHUB_STEP_SUMMARY
          echo "- kernel.bin: $(ls -lh build/kernel.bin | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- disk.img: $(ls -lh build/disk.img | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- ccache hit rate: $(ccache -s | grep 'cache hit rate' | awk '{print $4}')" >> $GITHUB_STEP_SUMMARY

  # ── Build userspace ─────────────────────────────────────────────────
  userspace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            gcc-x86-64-linux-gnu

      - name: Build userspace
        run: |
          cd userspace && make -j$(nproc) \
            CC=x86_64-linux-gnu-gcc \
            LD=x86_64-linux-gnu-ld

      - name: Verify initramfs.cpio
        run: |
          if [ -f userspace/initramfs.cpio ]; then
            echo "✅ initramfs.cpio created"
            ls -lh userspace/initramfs.cpio
            file userspace/initramfs.cpio
          else
            echo "❌ initramfs.cpio not found!"
            exit 1
          fi

      - name: Upload initramfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: initramfs
          path: userspace/initramfs.cpio
          retention-days: 7

      - name: Summary
        run: |
          echo "## Userspace Build" >> $GITHUB_STEP_SUMMARY
          echo "- initramfs.cpio: $(ls -lh userspace/initramfs.cpio | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY

  # ── Host-side unit tests ───────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential

      - name: Build unit test binaries
        run: |
          make -C tests/host_libc all -j$(nproc)
          make -C tests/unit all -j$(nproc)

      - name: Run unit tests (JUnit XML)
        run: |
          make junit-test JUNIT_DIR=${{ runner.temp }}/test-reports

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: ${{ runner.temp }}/test-reports/
          retention-days: 7

      - name: Install ccache (for stats only)
        run: |
          sudo apt-get install -y -qq ccache

      - name: Summary
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          for f in ${{ runner.temp }}/test-reports/*-results.xml; do
            name="$$(basename "$$f" -results.xml)"
            tests="$$(grep -o 'tests="[0-9]*"' "$$f" | head -1 | grep -o '[0-9]*')"
            fails="$$(grep -o 'failures="[0-9]*"' "$$f" | head -1 | grep -o '[0-9]*')"
            echo "- $$name: $$tests tests, $$fails failures" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ccache Stats" >> $GITHUB_STEP_SUMMARY
          if command -v ccache >/dev/null 2>&1; then
            ccache -s >> $GITHUB_STEP_SUMMARY
          else
            echo "- ccache not available" >> $GITHUB_STEP_SUMMARY
          fi

  # ── QEMU boot test ─────────────────────────────────────────────────
  boot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [kernel]
    steps:
      - uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel
          path: build/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86 python3

      - name: Run QEMU boot test
        run: |
          python3 src/test/boot_test.py \
            --kernel build/kernel.bin \
            --disk build/disk.img \
            --timeout 30

      - name: Summary
        run: |
          echo "## Boot Test" >> $GITHUB_STEP_SUMMARY
          echo "- Kernel boots successfully in QEMU" >> $GITHUB_STEP_SUMMARY

  # ── Direct QEMU boot test (no Python wrapper) ──────────────────────
  qemu-boot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [kernel]
    steps:
      - uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel
          path: build/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86

      - name: QEMU boot test (direct, 30s timeout)
        run: |
          timeout 30 qemu-system-x86_64 \
            -nographic \
            -kernel build/kernel.bin \
            -m 256M \
            -no-reboot \
            -display none \
            -serial mon:stdio \
            2>&1 | head -200 || true
          echo "---"
          echo "QEMU boot test completed (checked first 200 lines of output)"

      - name: Summary
        run: |
          echo "## QEMU Boot Test (Direct)" >> $GITHUB_STEP_SUMMARY
          echo "- Kernel boots via `qemu-system-x86_64 -nographic` with 30s timeout" >> $GITHUB_STEP_SUMMARY

  # ── Full build check (kernel + userspace) ──────────────────────────
  full-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Make version
        run: make --version

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            gcc-x86-64-linux-gnu xorriso grub-pc-bin mtools \
            ccache

      - name: ccache cache
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-full-${{ github.sha }}
          restore-keys: |
            ccache-full-
            ccache-

      - name: Build kernel
        run: |
          make -j$(nproc) \
            CC="ccache x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy

      - name: Build userspace
        run: |
          cd userspace && make -j$(nproc) \
            CC=x86_64-linux-gnu-gcc \
            LD=x86_64-linux-gnu-ld

      - name: Verify both artifacts
        run: |
          ls -lh build/kernel.bin
          ls -lh userspace/initramfs.cpio

      - name: ccache stats
        run: ccache -s

      - name: Summary
        run: |
          echo "## Full Build" >> $GITHUB_STEP_SUMMARY
          echo "- kernel.bin: $(ls -lh build/kernel.bin | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- disk.img: $(ls -lh build/disk.img | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- initramfs.cpio: $(ls -lh userspace/initramfs.cpio | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "- ccache hit rate: $(ccache -s | grep 'cache hit rate' | awk '{print $4}')" >> $GITHUB_STEP_SUMMARY

  # ── Code formatting check ──────────────────────────────────────────
  format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/git-clang-format

      - name: Check formatting
        run: |
          BASE_REF="origin/${{ github.base_ref || 'main' }}"
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1 2>/dev/null || true
          make format-check FORMAT_BASE_REF="$BASE_REF"

      - name: Summary
        run: echo "## Format Check" >> $GITHUB_STEP_SUMMARY

  # ── Trailing whitespace check ──────────────────────────────────────
  trailing-whitespace:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check trailing whitespace
        run: |
          make check-whitespace

      - name: Summary
        run: |
          echo "## Trailing Whitespace Check" >> $GITHUB_STEP_SUMMARY
          echo "- All source files free of trailing whitespace" >> $GITHUB_STEP_SUMMARY

  # ── Static analysis (cppcheck) ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cppcheck

      - name: Run cppcheck
        run: |
          make cppcheck-check

      - name: Summary
        run: |
          echo "## Lint (cppcheck)" >> $GITHUB_STEP_SUMMARY
          echo "- No cppcheck warnings found" >> $GITHUB_STEP_SUMMARY

  # ── Comprehensive static analysis ─────────────────────────────────
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install static analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cppcheck sparse clang-tidy-18
          sudo ln -sf /usr/bin/clang-tidy-18 /usr/local/bin/clang-tidy

      - name: cppcheck (static analysis with suppressions)
        continue-on-error: true
        run: make cppcheck-check

      - name: clang-tidy (kernel sources)
        continue-on-error: true
        run: make clang-tidy-check

      - name: clang-tidy (host-compilable test sources)
        continue-on-error: true
        run: make clang-tidy-host

      - name: check-padded (struct alignment -Wpadded)
        continue-on-error: true
        run: make check-padded

      - name: sparse (semantic parser for __user/__iomem annotations)
        continue-on-error: true
        run: make sparse

      - name: Summary
        if: always()
        run: |
          echo "## Static Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- cppcheck: all-enabled analysis with suppressions" >> $GITHUB_STEP_SUMMARY
          echo "- clang-tidy: kernel sources (first 20) + host test sources" >> $GITHUB_STEP_SUMMARY
          echo "- check-padded: struct alignment warnings" >> $GITHUB_STEP_SUMMARY
          echo "- sparse: semantic parser for kernel annotations" >> $GITHUB_STEP_SUMMARY

  # ── Fast pre-merge verification ────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            cppcheck \
            clang-tidy-18 \
            clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/git-clang-format

      - name: Make version
        run: make --version

      - name: Run verify (format-check + lint + app boundary check)
        run: |
          BASE_REF="origin/${{ github.base_ref || 'main' }}"
          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1 2>/dev/null || true
          make verify FORMAT_BASE_REF="$BASE_REF"

      - name: Summary
        run: |
          echo "## Fast Pre-Merge Verification" >> $GITHUB_STEP_SUMMARY
          echo "- format-check: passed" >> $GITHUB_STEP_SUMMARY
          echo "- lint (cppcheck + clang-tidy): passed" >> $GITHUB_STEP_SUMMARY
          echo "- app boundary check: passed" >> $GITHUB_STEP_SUMMARY

  # ── E2E smoke test ─────────────────────────────────────────────────
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [kernel]
    steps:
      - uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel
          path: build/

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            gcc-x86-64-linux-gnu xorriso grub-pc-bin mtools \
            python3 telnet

      - name: Build/repair disk image
        run: |
          # Quick rebuild to ensure initramfs references are satisfied
          make -j$(nproc) \
            CC="x86_64-linux-gnu-gcc" \
            LD=x86_64-linux-gnu-ld \
            OBJCOPY=x86_64-linux-gnu-objcopy \
            build/disk.img

      - name: Run e2e smoke test
        run: |
          E2E_SMOKE=1 ./tests/e2e.sh build/kernel.bin build/disk.img
        env:
          E2E_BOOT_TIMEOUT: "60"
          E2E_TIMEOUT: "15"
          E2E_EXTERNAL_DNS: "0"

      - name: Summary
        run: |
          echo "## E2E Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "- E2E tests passed" >> $GITHUB_STEP_SUMMARY
