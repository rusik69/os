name: USB FAT smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/drivers/usb*.c'
      - 'src/fs/fat32.c'
      - '.github/workflows/usb-fat.yml'

jobs:
  usb-fat-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            nasm \
            qemu-system-x86 \
            dosfstools

      - name: Build kernel
        run: |
          make CC=x86_64-linux-gnu-gcc \
               LD=x86_64-linux-gnu-ld \
               OBJCOPY=x86_64-linux-gnu-objcopy

      - name: Create disk images
        run: |
          mkdir -p build
          dd if=/dev/zero of=build/disk.img bs=1M count=16
          dd if=/dev/zero of=build/fat32_usb.img bs=4M count=1
          mkfs.vfat -F 32 build/fat32_usb.img
          echo smoke > mnt.txt
          sudo mkdir -p /tmp/fatmnt
          sudo mount -o loop build/fat32_usb.img /tmp/fatmnt
          sudo cp mnt.txt /tmp/fatmnt/smoke.txt
          sudo umount /tmp/fatmnt

      - name: QEMU USB FAT smoke (serial log)
        run: |
          SERIAL=$(mktemp)
          timeout 45 qemu-system-x86_64 \
            -kernel build/kernel.bin -m 256M \
            -serial file:$SERIAL -display none -vga none \
            -drive file=build/disk.img,format=raw,if=ide \
            -drive file=build/fat32_usb.img,format=raw,if=none,id=usb0 \
            -device qemu-xhci -device usb-storage,drive=usb0 \
            -netdev user,id=net0 -device virtio-net-pci,netdev=net0 \
            -no-reboot || true
          grep -E "USB MSC|FAT32 mounted" "$SERIAL" || \
            (echo "USB/FAT smoke markers not found"; cat "$SERIAL"; exit 1)
