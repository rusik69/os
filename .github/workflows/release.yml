# .github/workflows/release.yml — Release workflow for Hermes OS
#
# On tag push v* (e.g., v0.1.0, v1.2.3):
#   1. Build kernel + disk image from a clean checkout
#   2. Generate SHA-256 checksums for all artifacts
#   3. Create a GitHub Release with changelog and attached binaries
#
# Builds are done via the same steps as CI — using ubuntu-latest runners
# with cross toolchain packages.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

env:
  BUILDDIR: build
  ARTIFACT_DIR: release-artifacts

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      kernel_sha256: ${{ steps.checksums.outputs.kernel_sha256 }}
      disk_sha256: ${{ steps.checksums.outputs.disk_sha256 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release v${VERSION}"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential nasm qemu-system-x86 \
            x86_64-elf-gcc x86_64-linux-gnu-gcc \
            xorriso grub-pc-bin python3

      - name: Build kernel
        run: |
          make -j"$(nproc)" all
          echo "=== Build artifacts ==="
          ls -lh build/

      - name: Collect artifacts
        run: |
          mkdir -p "${ARTIFACT_DIR}"
          cp "${BUILDDIR}/kernel.bin"  "${ARTIFACT_DIR}/kernel.bin"
          cp "${BUILDDIR}/disk.img"    "${ARTIFACT_DIR}/disk.img"
          # Include kernel ELF with debug symbols for developers
          if [ -f "${BUILDDIR}/kernel.elf" ]; then
            cp "${BUILDDIR}/kernel.elf" "${ARTIFACT_DIR}/kernel.elf"
          fi

      - name: Generate checksums
        id: checksums
        run: |
          cd "${ARTIFACT_DIR}"
          sha256sum kernel.bin disk.img kernel.elf 2>/dev/null > SHA256SUMS
          cat SHA256SUMS
          echo "kernel_sha256=$(sha256sum kernel.bin | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "disk_sha256=$(sha256sum disk.img | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (CI retention)
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: ${{ env.ARTIFACT_DIR }}/
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')"
          if [ -z "${PREVIOUS_TAG}" ]; then
            CHANGELOG="## What's Changed\n\nInitial release of Hermes OS v${{ needs.build.outputs.version }}."
          else
            CHANGELOG="## What's Changed\n\n"
            CHANGELOG+="Full Changelog: [${PREVIOUS_TAG}...${GITHUB_REF_NAME}](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${GITHUB_REF_NAME})\n\n"
            CHANGELOG+="### Commits\n"
            while IFS= read -r line; do
              CHANGELOG+="$line\n"
            done <<< "$(git log --oneline "${PREVIOUS_TAG}..${GITHUB_REF_NAME}" 2>/dev/null || echo "No new commits")"
          fi
          CHANGELOG="${CHANGELOG//$'\n'/'\n'}"
          {
            echo 'body<<END_CHANGELOG'
            printf "%b" "$CHANGELOG"
            echo ""
            echo ""
            echo "### Artifact Checksums (SHA-256)"
            echo "\`\`\`"
            cat release-artifacts/SHA256SUMS
            echo "\`\`\`"
            echo ""
            echo "**kernel.bin:** \`${{ needs.build.outputs.kernel_sha256 }}\`"
            echo "**disk.img:** \`${{ needs.build.outputs.disk_sha256 }}\`"
            echo 'END_CHANGELOG'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hermes OS v${{ needs.build.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            release-artifacts/kernel.bin
            release-artifacts/disk.img
            release-artifacts/kernel.elf
            release-artifacts/SHA256SUMS
          fail_on_unmatched_files: false
