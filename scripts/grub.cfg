# GRUB configuration for Hermes OS
# Used by `make install` to create a bootable ISO image.
#
# The kernel is a multiboot1-compliant ELF64 binary.  GRUB (or GRUB2)
# loads it via the multiboot protocol, which passes the multiboot info
# structure to the kernel for hardware discovery.

set default=0
set timeout=5

menuentry "Hermes OS" {
    multiboot /boot/kernel.elf
    boot
}

menuentry "Hermes OS (verbose)" {
    multiboot /boot/kernel.elf debug verbose
    boot
}

menuentry "Hermes OS (single CPU)" {
    multiboot /boot/kernel.elf maxcpus=1
    boot
}
